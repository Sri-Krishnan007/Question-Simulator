{% extends "layout.html" %}

{% block content %}
<div class="glass-panel" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 2rem; color: var(--primary);">Login</h2>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div style="background: rgba(255, 0, 0, 0.2); padding: 10px; margin-bottom: 15px; border-radius: 5px; text-align: center; color: white;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" style="display: flex; flex-direction: column; gap: 1rem;">
        <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Username</label>
            <input type="text" name="username" required style="width: 100%; padding: 0.8rem; border-radius: 5px; border: 1px solid var(--primary-dim); background: rgba(0,0,0,0.5); color: white; font-family: inherit;">
        </div>
        <div>
            <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Password</label>
            <input type="password" name="password" required style="width: 100%; padding: 0.8rem; border-radius: 5px; border: 1px solid var(--primary-dim); background: rgba(0,0,0,0.5); color: white; font-family: inherit;">
        </div>
        
        <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Login</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
        Don't have an account? <a href="{{ url_for('auth.signup') }}" style="color: var(--primary); text-decoration: none;">Sign up here</a>
    </p>
</div>
{% endblock %}
